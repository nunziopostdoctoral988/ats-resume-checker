<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact &mdash; ATS Resume Checker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%93%84</text></svg>">
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/components.css">
<link rel="stylesheet" href="../assets/css/animations.css">
<link rel="stylesheet" href="../assets/css/responsive.css">
<link rel="stylesheet" href="../assets/css/print.css">
</head>
<body data-page="contact">
<div id="navbar-root"></div>
<main class="container" style="padding-block:var(--space-10) var(--space-16);max-width:560px">
  <div class="section-head" style="margin-bottom:var(--space-8)">
    <div class="eyebrow">Get In Touch</div>
    <h2>Contact</h2>
    <p>Questions or feedback? Reach out via email or the form below.</p>
  </div>
  <div class="card" style="margin-bottom:var(--space-6)">
    <h3 style="margin-bottom:var(--space-4)">Direct Contact</h3>
    <div class="flex-col gap-3">
      <a href="mailto:jahangirhussen.programmer@gmail.com" class="flex items-center gap-3" style="color:var(--text)">
        <span class="icon-badge" style="width:36px;height:36px;flex-shrink:0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="m4 4 8 8 8-8"/></svg>
        </span>
        <span>jahangirhussen.programmer@gmail.com</span>
      </a>
      <a href="https://wa.me/8801849620018" target="_blank" rel="noopener" class="flex items-center gap-3" style="color:var(--text)">
        <span class="icon-badge" style="width:36px;height:36px;flex-shrink:0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21l1.65-4.95A8 8 0 1 1 8.9 19.3z"/></svg>
        </span>
        <span>+880 1849 620018 (WhatsApp call/chat)</span>
      </a>
      <a href="https://github.com/Jahangirhussen/" target="_blank" rel="noopener" class="flex items-center gap-3" style="color:var(--text)">
        <span class="icon-badge" style="width:36px;height:36px;flex-shrink:0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-4.3 1.4-4.3-2.5-6-3m12 5v-3.5c0-1 .1-1.4-.5-2 2.8-.3 5.5-1.4 5.5-6a4.6 4.6 0 0 0-1.3-3.2 4.2 4.2 0 0 0-.1-3.2s-1.1-.3-3.5 1.3a12.3 12.3 0 0 0-6.2 0C6.5 2.8 5.4 3.1 5.4 3.1a4.2 4.2 0 0 0-.1 3.2A4.6 4.6 0 0 0 4 9.5c0 4.6 2.7 5.7 5.5 6-.6.6-.6 1.2-.5 2V21"/></svg>
        </span>
        <span>github.com/Jahangirhussen</span>
      </a>
      <a href="https://www.kaggle.com/Jahangirhussen" target="_blank" rel="noopener" class="flex items-center gap-3" style="color:var(--text)">
        <span class="icon-badge" style="width:36px;height:36px;flex-shrink:0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M8 8v8m8-8-5 5 5.5 3.5M8 12h.01"/></svg>
        </span>
        <span>kaggle.com/Jahangirhussen</span>
      </a>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-bottom:var(--space-4)">Or Send a Message</h3>
    <form id="contact-form" class="flex-col gap-4">
      <div class="field"><label for="c-name">Name</label><input type="text" id="c-name" required></div>
      <div class="field"><label for="c-email">Email</label><input type="email" id="c-email" required></div>
      <div class="field"><label for="c-msg">Message</label><textarea id="c-msg" rows="5" required></textarea></div>
      <button type="submit" class="btn btn-primary btn-block">Send Message</button>
    </form>
  </div>
</main>
<div id="footer-root"></div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/app.js"></script>
<script>
document.getElementById("contact-form").addEventListener("submit", (e) => {
  e.preventDefault();
  const name = document.getElementById("c-name").value;
  const email = document.getElementById("c-email").value;
  const msg = document.getElementById("c-msg").value;
  const subject = encodeURIComponent(`ATS Resume Checker — message from ${name}`);
  const body = encodeURIComponent(`${msg}\n\nFrom: ${name} (${email})`);
  window.location.href = `mailto:jahangirhussen.programmer@gmail.com?subject=${subject}&body=${body}`;
  Utils.toast("Opening your email app to send this message...");
  e.target.reset();
});
</script>
</body>
</html>
